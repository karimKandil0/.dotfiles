############################
# Fonts
############################
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

############################
# Cursor / Behavior
############################
cursor_shape beam
cursor_blink_interval 0.55
shell_integration enabled
scrollback_lines 20000
copy_on_select yes
strip_trailing_spaces smart
enable_audio_bell no
confirm_os_window_close 0

############################
# Layout / Spacing
############################
window_padding_width 1
remember_window_size yes
initial_window_width 120c
initial_window_height 34c

############################
# Mouse / URLs
############################
mouse_hide_wait 2.0
open_url_with default
url_style curly

############################
# Tabs (minimal)
############################
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_separator " "

############################
# Opacity (works with compositor/Hypr)
############################
background_opacity 0.90
dim_opacity 0.85
inactive_text_alpha 0.85

############################
# Theme: pywal generated (fallback colors below)
############################
include ~/.cache/wal/colors-kitty.conf

# Fallbacks if pywal file is missing
background #1e1e2e
foreground #cdd6f4
selection_background #45475a
selection_foreground #cdd6f4

############################
# Useful keymaps
############################
map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_window
map ctrl+shift+q close_tab
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+f launch --location=hsplit
map ctrl+shift+d launch --location=vsplit
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
map ctrl+shift+o kitten hints --type url
