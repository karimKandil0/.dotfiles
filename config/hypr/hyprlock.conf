# ~/.dotfiles/config/hypr/hyprlock.conf
# Simple, fast lockscreen

general {
    hide_cursor = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.015
    contrast = 1.05
    brightness = 0.90
    vibrancy = 0.20
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.20
    dots_center = true
    outer_color = rgba(cba6f7ff)
    inner_color = rgba(1e1e2eff)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Mono ExtraBold
    position = 0, 110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B')"
    color = rgba(a6adc8ff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 40
    halign = center
    valign = center
}
