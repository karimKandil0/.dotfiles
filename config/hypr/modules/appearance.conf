########################################
# LOOK & FEEL — GENERAL APPEARANCE
# Window gaps, borders, colors, layout behavior.
########################################
general {
    gaps_in = 6
    gaps_out = 14

    border_size = 2

    col.active_border = rgba(cba6f7ee)
    col.inactive_border = rgba(45475aaa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

debug {
    disable_logs = false
}


########################################
# DECORATION — ROUNDING, SHADOWS, BLUR
########################################
decoration {
    rounding = 9

    active_opacity = 1.0
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.25
    }
}


########################################
# ANIMATIONS — GLOBAL ANIMATION SETTINGS
# Controls easing curves, speeds, and styles.
########################################
animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     5.4,   easeOutQuint
    animation = windowsIn,     1,     5.0,   easeOutQuint, popin 90%
    animation = windowsOut,    1,     2.2,   easeInOutCubic, popin 85%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     3.2,   easeOutQuint, slide
    animation = workspacesIn,  1,     2.5,   easeOutQuint, slide
    animation = workspacesOut, 1,     2.5,   easeInOutCubic, slide
}


########################################
# LAYOUTS — DWINDLE & MASTER SETTINGS
########################################
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}


########################################
# MISCELLANEOUS OPTIONS
########################################
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    vfr = true
}
