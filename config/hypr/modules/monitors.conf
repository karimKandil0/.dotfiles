########################################
# MONITOR CONFIGURATION
# Detects monitors automatically and sets
# preferred resolution, refresh rate, and position.
########################################
# monitor=DVI-D-1,1024x768,0x0,1
monitor=HDMI-A-1,1366x768,1024x0,1
monitor=DP-1,1920x1080,2390x0,1

########################################
# WORKSPACE RULES
# Assigns workspaces to specific monitors.
########################################
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 3, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1

workspace = 2, monitor:DP-1, default:true
workspace = 4, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 0, monitor:DP-1
